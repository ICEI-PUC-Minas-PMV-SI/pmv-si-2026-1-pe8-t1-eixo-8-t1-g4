<div class="main">
  <div class="page-header">
    <div class="page-header-row">
      <div>
        <h1>Histórico de Solicitações</h1>
        <p>Registro completo de todas as solicitações</p>
      </div>
      <div class="form-group" style="flex-direction:row;align-items:center;gap:8px;">
        <label class="form-label" style="white-space:nowrap;margin:0;">Filtrar linha:</label>
        <select id="filtroLinha" class="form-input" style="width:auto;">
          <option value="todas">Todas as linhas</option>
          <option value="Linha A">Linha A</option>
          <option value="Linha B">Linha B</option>
        </select>
      </div>
    </div>
  </div>

  <div id="historico"></div>
</div>

<script>
  let todasSolicitacoes = [];

  function statusClass(status) {
    if (status === 'pendente') return 'pending';
    if (status === 'em progresso') return 'progress';
    return 'done';
  }

  function renderCard(s) {
    const sc = statusClass(s.status);
    const materiais = s.materiais || {};
    const tags = [
      materiais.cartucho > 0 ? `Cartucho: ${materiais.cartucho}` : '',
      materiais.bula > 0 ? `Bula: ${materiais.bula}` : '',
      materiais.rotulo > 0 ? `Rótulo: ${materiais.rotulo}` : '',
      materiais.caixa > 0 ? `Caixa: ${materiais.caixa}` : '',
    ].filter(Boolean).map(t => `<span class="material-tag">${t}</span>`).join('');

    const data = new Date(s.dataSolicitacao).toLocaleString('pt-BR');
    const dataAtend = s.dataAtendimento
      ? `<span>✔ ${new Date(s.dataAtendimento).toLocaleString('pt-BR')}</span>` : '';

    return `
      <div class="request-card">
        <div class="request-card__header request-card__header--${sc}">
          <span class="request-card__title">${s.linha}</span>
          <span class="badge badge--${sc}">${s.status}</span>
        </div>
        <div class="request-card__body">
          <div class="request-card__meta">
            <span>👤 ${s.solicitante || '—'}</span>
            <span>🕐 ${data}</span>
            ${dataAtend}
          </div>
          <div class="request-card__materials">${tags || '<span class="material-tag" style="color:var(--text-muted)">Sem materiais</span>'}</div>
          ${s.observacoes ? `<div class="request-card__obs">"${s.observacoes}"</div>` : ''}
        </div>
      </div>
      ${s.problema ? `
      <div class="request-card__problema">
        <span class="request-card__problema-icon">⚠️</span>
        <div class="request-card__problema-body">
          <div class="request-card__problema-label">Problema Reportado pelo Almoxarifado</div>
          <div class="request-card__problema-text">${s.problema}</div>
        </div>
      </div>` : ''}
    </div>
    `;
  }

  function render() {
    const filtro = document.getElementById('filtroLinha').value;
    const container = document.getElementById('historico');
    const filtradas = filtro === 'todas'
      ? todasSolicitacoes
      : todasSolicitacoes.filter(s => s.linha === filtro);

    if (filtradas.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <h3>Nenhuma solicitação encontrada</h3>
          <p>Ainda não há registros para o filtro selecionado.</p>
        </div>`;
      return;
    }
    container.innerHTML = filtradas.map(renderCard).join('');
  }

  document.getElementById('filtroLinha').addEventListener('change', render);

  fetch('http://localhost:3000/solicitacoes')
    .then(r => r.json())
    .then(lista => {
      todasSolicitacoes = lista.sort(
        (a, b) => new Date(b.dataSolicitacao) - new Date(a.dataSolicitacao)
      );
      render();
    })
    .catch(() => {
      document.getElementById('historico').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h3>Erro ao carregar</h3>
          <p>Verifique se o servidor está rodando em http://localhost:3000</p>
        </div>`;
    });
</script>

</body>
</html>
